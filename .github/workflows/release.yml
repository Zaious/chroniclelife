name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build portable exe
        run: npm run tauri build

      - name: Create release with portable exe
        run: >
          gh release create ${{ github.ref_name }}
          "src-tauri/target/release/chroniclelife.exe"
          --title "ChronicleLife ${{ github.ref_name }}"
          --notes "免安裝單檔:下載 chroniclelife.exe 雙擊即用(Win11 內建 WebView2,無需安裝)。"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
